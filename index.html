<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reroll Check Perf</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="images/rcp-logo.svg">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="images/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="images/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#74220f">
</head>

<body class="public-page">
  <header>Contrôle tarif véhicule</header>

  <main>
    <div class="tabs">
      <a class="tab active" href="index.html">Contrôle tarif</a>
      <a class="tab" href="login.html">Inventaire</a>
    </div>

    <div class="card">
      <label for="search">Rechercher un véhicule</label>
      <input id="search" type="text" placeholder="Ex : Rapid, Ambulance, Banshee...">

      <label for="vehicleSelect">Véhicule</label>
      <select id="vehicleSelect"><option>Chargement...</option></select>

      <div id="debug" class="muted"></div>
    </div>

    <div id="errorBox" class="card error" style="display:none;"></div>

    <div class="card">
      <div class="vehicle-info">
        <div class="info-item">
          <div class="info-label">Modèle</div>
          <div id="modelName" class="info-value">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Gamme</div>
          <div id="category" class="info-value">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Prix HT</div>
          <div id="priceHT" class="price">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Prix TTC</div>
          <div id="priceTTC" class="price">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Performances</h2>
      <div id="performances" class="grid"></div>
    </div>

    <div class="total">
      <div class="total-row"><span>Véhicule TTC</span><span id="vehicleTotal">-</span></div>
      <div class="total-row"><span>Total perfs</span><span id="perfTotal">-</span></div>
      <div class="total-row total-main"><span>Total global</span><span id="globalTotal">-</span></div>
    </div>
  </main>

  <button id="themeToggle" class="theme-toggle" title="Changer de thème">☀</button>
  <div class="app-version" title="Mise à jour visuelle">🎨 v1.2</div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/public.js"></script>
</body>
</html>
