<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reroll Check Perf</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="images/favicon-48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="images/favicon-64.png">
  <link rel="icon" type="image/png" sizes="96x96" href="images/favicon-96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#74220f">
</head>

<body class="public-page">
  <header class="page-header page-header--public">
    <div class="page-header-inner">
      <img class="page-header-logo" src="images/header-logo-128.png" alt="RCP">
      <div class="page-header-title-frame">
        <span class="page-header-title">Contrôle tarif véhicule</span>
      </div>
      <span class="page-header-balance" aria-hidden="true"></span>
    </div>
  </header>

  <main>
    <nav
      class="tabs"
      aria-label="Navigation principale"
      data-app-navigation
      data-active-page="control"
    ></nav>

    <div class="card">
      <label for="search">Rechercher un véhicule</label>
      <input id="search" type="text" placeholder="Ex : Rapid, Ambulance, Banshee...">

      <label for="vehicleSelect">Véhicule</label>
      <select id="vehicleSelect"><option>Chargement...</option></select>

      <div id="debug" class="muted"></div>
    </div>

    <div id="errorBox" class="card error" style="display:none;"></div>

    <div class="card">
      <div class="vehicle-info">
        <div class="info-item">
          <div class="info-label">Modèle</div>
          <div id="modelName" class="info-value">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Gamme</div>
          <div id="category" class="info-value">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Prix HT</div>
          <div id="priceHT" class="price">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Prix TTC</div>
          <div id="priceTTC" class="price">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Performances</h2>
      <div id="performances" class="grid"></div>
    </div>

    <div class="total">
      <div class="total-row"><span>Véhicule TTC</span><span id="vehicleTotal">-</span></div>
      <div class="total-row"><span>Total perfs</span><span id="perfTotal">-</span></div>
      <div class="total-row total-main"><span>Total global</span><span id="globalTotal">-</span></div>
    </div>
  </main>

  <button id="themeToggle" class="theme-toggle" title="Changer de thème">☀</button>
  <div class="app-version"><span>⚙️ v1.3.3</span> · <a href="mentions-legales.html" aria-label="Mentions légales et confidentialité">Mentions légales</a></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/revisions.js"></script>
  <script src="js/tariff-profile.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/performance-pricing.js"></script>
  <script src="js/public.js"></script>
</body>
</html>
