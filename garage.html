<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventaire - Reroll Check Perf</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="images/rcp-logo.svg">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="images/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="images/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#262626">
</head>

<body class="garage-page">
  <header class="page-header page-header--garage">
    <div class="page-header-inner">
      <img class="page-header-logo" src="images/rcp-logo.svg" alt="RCP">
      <div class="page-header-title-frame">
        <span class="page-header-title">Inventaire</span>
      </div>
      <span class="page-header-balance" aria-hidden="true"></span>
    </div>
  </header>

  <main>
    <div class="tabs">
      <a class="tab" href="index.html">Contrôle tarif</a>
      <a class="tab active" href="garage.html">Inventaire</a>
      <button type="button" id="logoutButton" class="tab garage-logout" onclick="logoutGarageUser()">Déconnexion</button>
    </div>

    <div id="error" class="error"></div>

    <section class="card garage-panel collapsed" data-garage-panel="actions">
      <button
        type="button"
        class="garage-panel-toggle"
        aria-expanded="false"
        aria-controls="garagePanelActionsContent"
      >
        <span>Actions</span>
        <span class="garage-panel-icon" aria-hidden="true">▼</span>
      </button>

      <div id="garagePanelActionsContent" class="garage-panel-content">
        <div class="grid">
          <button onclick="toggleCardForm()">Acheter une carte grise</button>
          <button onclick="toggleVehicleForm()">Ajouter un véhicule</button>
        </div>

        <div id="cardForm" class="inline-form" style="display:none;">
          <select id="cardType">
            <option value="normal">Carte grise ordinaire</option>
            <option value="special">Carte grise spéciale</option>
          </select>
          <input id="cardDate" placeholder="Date achat ex : 03/07/2026">
          <input id="cardPrice" placeholder="Prix payé">
          <input id="cardComment" placeholder="Commentaire">
          <button onclick="buyCard()">Valider l’achat</button>
        </div>

        <div id="vehicleForm" class="inline-form" style="display:none;">
          <select id="cardSelect"></select>
          <select id="vehicleSelect" onchange="updateGarageCardSelect()"></select>
          <input id="customName" placeholder="Nom personnalisé">
          <input id="plate" placeholder="Plaque">
          <input id="codeAhm" placeholder="Code AHM, ex : AHM.Q01">
          <input id="dateAchat" placeholder="Date achat ex : 03/07/2026">
          <button onclick="addVehicle()">Ajouter</button>
        </div>
      </div>
    </section>

    <section class="card garage-panel collapsed" data-garage-panel="cards">
      <button
        type="button"
        class="garage-panel-toggle"
        aria-expanded="false"
        aria-controls="garagePanelCardsContent"
      >
        <span>Cartes grises</span>
        <span class="garage-panel-icon" aria-hidden="true">▼</span>
      </button>

      <div id="garagePanelCardsContent" class="garage-panel-content garage-card-stats-group">
        <section class="garage-card-stats-category">
          <h3>Cartes grises normales</h3>
          <div class="grid stats-grid">
            <div class="stat"><span>Cartes possédées</span><strong id="normalCardsTotal">-</strong></div>
            <div class="stat"><span>Cartes utilisées</span><strong id="normalCardsUsed">-</strong></div>
            <div class="stat"><span>Cartes libres</span><strong id="normalCardsFree">-</strong></div>
            <div class="stat"><span>Dépenses ventilées</span><strong id="normalCardsSpent">—</strong></div>
          </div>
        </section>

        <section class="garage-card-stats-category">
          <h3>Cartes grises spéciales</h3>
          <div class="grid stats-grid">
            <div class="stat"><span>Cartes possédées</span><strong id="specialCardsTotal">-</strong></div>
            <div class="stat"><span>Cartes utilisées</span><strong id="specialCardsUsed">-</strong></div>
            <div class="stat"><span>Cartes libres</span><strong id="specialCardsFree">-</strong></div>
            <div class="stat"><span>Dépenses ventilées</span><strong id="specialCardsSpent">—</strong></div>
          </div>
        </section>

        <div class="garage-card-spent-total">
          <span>Dépensé en cartes — total global</span>
          <strong id="cardsSpent">-</strong>
        </div>
      </div>
    </section>

    <section class="card garage-panel" data-garage-panel="inventory">
      <button
        type="button"
        class="garage-panel-toggle"
        aria-expanded="true"
        aria-controls="garagePanelInventoryContent"
      >
        <span>Inventaire</span>
        <span class="garage-panel-icon" aria-hidden="true">▲</span>
      </button>

      <div id="garagePanelInventoryContent" class="garage-panel-content">
        <div class="vehicle-filters" role="group" aria-label="Filtrer les véhicules">
          <button type="button" class="vehicle-filter active" data-filter="active" aria-pressed="true" onclick="setGarageVehicleFilter('active')">
            En possession <span id="activeVehiclesCount">0</span>
          </button>
          <button type="button" class="vehicle-filter" data-filter="vendu" aria-pressed="false" onclick="setGarageVehicleFilter('vendu')">
            Vendus <span id="soldVehiclesCount">0</span>
          </button>
          <button type="button" class="vehicle-filter" data-filter="assurance" aria-pressed="false" onclick="setGarageVehicleFilter('assurance')">
            Assurance <span id="insuredVehiclesCount">0</span>
          </button>
          <button type="button" class="vehicle-filter" data-filter="all" aria-pressed="false" onclick="setGarageVehicleFilter('all')">
            Tous <span id="allVehiclesCount">0</span>
          </button>
        </div>

        <div id="vehicleList"></div>
      </div>
    </section>
  </main>

  <button id="themeToggle" class="theme-toggle" title="Changer de thème">☀</button>
  <div class="app-version" title="Mise à jour visuelle">🎨 v1.2</div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/garage.js"></script>
</body>
</html>
